[project]
name = "tradebot-signals"
version = "0.1.0"
description = "Signal generation, data ingestion, and backtesting for Tradebot"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26",
    "pandas>=2.2",
    "scipy>=1.12",
    "requests>=2.31",
    "websockets>=13.0",
    "redis>=5.0",
    "python-dotenv>=1.0",
    "httpx>=0.27",
    "pydantic>=2.6",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.3",
]

[tool.ruff]
line-length = 100

[build-system]
requires = ["setuptools>=69.0"]
build-backend = "setuptools.backends._legacy:_Backend"
