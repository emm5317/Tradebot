<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradebot — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="header">
        <div class="header-left">
            <h1>&gt; TRADEBOT</h1>
            <span class="keyboard-hint">
                <kbd>R</kbd> refresh &nbsp;
                <kbd>1</kbd>&ndash;<kbd>4</kbd> focus &nbsp;
                <kbd>Esc</kbd> back
            </span>
        </div>
        <div class="status" id="system-status">
            <span class="status-item"><span class="status-dot"></span>loading&hellip;</span>
        </div>
    </div>

    <div class="container" id="main-grid">
        <div class="panel" id="panel-1">
            <div class="panel-header">
                <div class="panel-title">Model State <span class="live-indicator"></span></div>
                <div class="panel-meta" id="meta-1"></div>
            </div>
            <div class="panel-body" id="model-state"></div>
        </div>
        <div class="panel" id="panel-2">
            <div class="panel-header">
                <div class="panel-title">Recent Signals</div>
                <div class="panel-meta" id="meta-2"></div>
            </div>
            <div class="panel-body" id="signals-panel"></div>
        </div>
        <div class="panel" id="panel-3">
            <div class="panel-header">
                <div class="panel-title">Positions</div>
                <div class="panel-meta" id="meta-3"></div>
            </div>
            <div class="panel-body" id="positions-table"></div>
        </div>
        <div class="panel" id="panel-4">
            <div class="panel-header">
                <div class="panel-title">Daily Summary</div>
                <div class="panel-meta" id="meta-4"></div>
            </div>
            <div class="panel-body" id="daily-summary"></div>
        </div>
    </div>

    <script>
    // ── Constants ──────────────────────────────────────────────────────────────
    const EDGE_MIN = 0.05;

    // ── Cached API data ───────────────────────────────────────────────────────
    let cachedModelState = [];
    let cachedSignals = [];
    let cachedPositions = [];
    let cachedSummary = [];

    // ── Sort state ────────────────────────────────────────────────────────────
    const sortState = {
        signals:   { col: 0, dir: -1 },
        positions: { col: 0, dir: 1 },
        summary:   { col: 0, dir: -1 },
    };

    // ── Helpers ───────────────────────────────────────────────────────────────
    function ageText(date) {
        const s = Math.floor((Date.now() - date) / 1000);
        if (s < 60)   return s + 's ago';
        if (s < 3600) return Math.floor(s / 60) + 'm ago';
        return Math.floor(s / 3600) + 'h ago';
    }

    function ageClass(date) {
        const s = (Date.now() - date) / 1000;
        if (s < 60)   return 'age-fresh';
        if (s < 300)  return 'age-recent';
        if (s < 1800) return 'age-old';
        return 'age-stale';
    }

    function rejClass(reason) {
        if (!reason) return 'rej-generic';
        if (reason.includes('edge'))     return 'rej-edge';
        if (reason.includes('position')) return 'rej-position';
        if (reason.includes('risk'))     return 'rej-risk';
        return 'rej-generic';
    }

    function touchMeta(id) {
        var el = document.getElementById('meta-' + id);
        if (!el) return;
        el.textContent = 'updated just now';
        el.classList.add('fresh');
        setTimeout(function() {
            el.classList.remove('fresh');
        }, 2500);
    }

    function calcUnrealized(p) {
        if (!p.fill_price || !p.current_price || p.status === 'closed') return null;
        var shares = p.size_cents / (p.fill_price * 100);
        var diff = (p.current_price - p.fill_price) * (p.direction === 'yes' ? 1 : -1);
        return Math.round(diff * shares * 100);
    }

    function bindSort(container, key, renderFn) {
        container.querySelectorAll('th[data-col]').forEach(function(th) {
            th.addEventListener('click', function() {
                var col = parseInt(th.dataset.col);
                if (sortState[key].col === col) sortState[key].dir *= -1;
                else { sortState[key].col = col; sortState[key].dir = 1; }
                renderFn();
            });
        });
    }

    // ── Fetch helpers ─────────────────────────────────────────────────────────
    function fetchJSON(url) {
        return fetch(url).then(function(r) { return r.json(); }).catch(function() { return null; });
    }

    // ── Health ────────────────────────────────────────────────────────────────
    function fetchHealth() {
        fetchJSON('/api/health').then(function(data) {
            var el = document.getElementById('system-status');
            if (!data || !el) return;
            var items = ['postgres', 'redis'].map(function(svc) {
                var ok = data[svc] === 'connected';
                return '<span class="status-item"><span class="status-dot ' +
                    (ok ? 'ok' : 'error') + '"></span>' + svc + '</span>';
            }).join('');
            el.innerHTML = items;
        });
    }

    // ── Model State ───────────────────────────────────────────────────────────
    function fetchModelState() {
        fetchJSON('/api/model-state').then(function(states) {
            if (!states) return;
            cachedModelState = states;
            renderModelState();
        });
    }

    function renderModelState() {
        var el = document.getElementById('model-state');
        if (!cachedModelState.length) {
            el.innerHTML = '<span class="rejected rej-generic">no active contracts</span>';
            touchMeta(1);
            return;
        }
        el.innerHTML = '<div class="model-cards">' + cachedModelState.map(function(s) {
            var dir = s.direction || '?';
            var prob = s.model_prob || 0;
            var edge = s.edge || 0;
            var edgeFrac = Math.min(edge / 0.15, 1);
            var edgeFill = edge >= EDGE_MIN ? 'edge' : 'amber';
            var threshPct = (EDGE_MIN / 0.15) * 100;
            var rej = s.rejection_reason
                ? '<div class="card-rejection ' + rejClass(s.rejection_reason) + '">' + s.rejection_reason + '</div>'
                : '';
            return '<div class="model-card">' +
                '<div class="card-top">' +
                    '<span class="ticker">' + s.ticker + '</span>' +
                    '<span class="card-direction ' + dir + '">' + dir.toUpperCase() + '</span>' +
                '</div>' +
                '<div class="bars">' +
                    '<div class="bar-row">' +
                        '<span class="bar-label">PROB</span>' +
                        '<div class="bar-track"><div class="bar-fill ' + dir + '" style="width:' + (prob * 100).toFixed(1) + '%"></div></div>' +
                        '<span class="bar-value">' + (prob * 100).toFixed(1) + '%</span>' +
                    '</div>' +
                    '<div class="bar-row">' +
                        '<span class="bar-label">EDGE</span>' +
                        '<div class="bar-track">' +
                            '<div class="bar-fill ' + edgeFill + '" style="width:' + (edgeFrac * 100).toFixed(1) + '%"></div>' +
                            '<div class="bar-threshold" style="left:' + threshPct.toFixed(1) + '%"></div>' +
                        '</div>' +
                        '<span class="bar-value ' + (edge >= EDGE_MIN ? 'edge-high' : 'edge-low') + '">' + (edge * 100).toFixed(1) + '%</span>' +
                    '</div>' +
                '</div>' +
                '<div class="detail-grid">' +
                    '<div class="detail-row"><span>Market</span><span class="value">' + ((s.market_price || 0) * 100).toFixed(1) + '%</span></div>' +
                    '<div class="detail-row"><span>Minutes</span><span class="value">' + (s.minutes_remaining ? s.minutes_remaining.toFixed(1) : '\u2013') + '</span></div>' +
                '</div>' +
                rej +
            '</div>';
        }).join('') + '</div>';
        touchMeta(1);
    }

    // ── Heatmap ───────────────────────────────────────────────────────────────
    function buildHeatmap(signals) {
        var all = signals.slice().reverse();
        var fired = all.filter(function(s) { return s.acted_on; }).length;
        var lowEdge = all.filter(function(s) { return !s.acted_on && (s.rejection_reason || '').includes('edge'); }).length;
        var rej = all.filter(function(s) { return !s.acted_on; }).length;

        var blocks = all.map(function(s) {
            var cls, tip;
            if (s.acted_on) {
                cls = 'hm-fired';
                tip = 'FIRED | ' + s.ticker + ' ' + s.direction + ' | ' + (s.edge * 100).toFixed(1) + '%';
            } else if ((s.rejection_reason || '').includes('edge')) {
                cls = 'hm-low-edge';
                tip = 'LOW EDGE | ' + s.ticker + ' | ' + (s.edge * 100).toFixed(1) + '%';
            } else {
                cls = 'hm-rejected';
                tip = 'REJECTED | ' + s.ticker + ' | ' + (s.rejection_reason || 'unknown');
            }
            return '<div class="hm-block ' + cls + '" title="' + tip + '"></div>';
        }).join('');

        return '<div class="heatmap-wrap">' +
            '<div class="heatmap-label">Last ' + all.length + ' signals &nbsp;' +
                '<span class="dir-yes">' + fired + ' fired</span> &nbsp;' +
                '<span class="edge-low">' + lowEdge + ' low-edge</span> &nbsp;' +
                '<span class="rejected rej-generic">' + rej + ' rejected</span>' +
            '</div>' +
            '<div class="heatmap-strip">' + blocks + '</div>' +
        '</div>';
    }

    // ── Signals ───────────────────────────────────────────────────────────────
    function fetchSignals() {
        fetchJSON('/api/signals?limit=30').then(function(signals) {
            if (!signals) return;
            cachedSignals = signals;
            renderSignals();
        });
    }

    function renderSignals() {
        var el = document.getElementById('signals-panel');
        if (!cachedSignals.length) {
            el.innerHTML = '<span class="rejected rej-generic">no signals yet</span>';
            touchMeta(2);
            return;
        }

        var st = sortState.signals;
        var cols = [
            { label: 'Age',    fn: function(s) { return new Date(s.created_at).getTime(); } },
            { label: 'Ticker', fn: function(s) { return s.ticker; } },
            { label: 'Dir',    fn: function(s) { return s.direction; } },
            { label: 'Edge',   fn: function(s) { return s.edge || 0; } },
            { label: 'Kelly',  fn: function(s) { return s.kelly_fraction || 0; } },
            { label: 'Status', fn: function(s) { return s.acted_on ? 1 : 0; } },
        ];

        var sorted = cachedSignals.slice().sort(function(a, b) {
            var av = cols[st.col].fn(a), bv = cols[st.col].fn(b);
            return av < bv ? -st.dir : av > bv ? st.dir : 0;
        });

        var html = buildHeatmap(cachedSignals) + '<table><thead><tr>';
        cols.forEach(function(c, i) {
            var cls = i === st.col ? (st.dir === 1 ? 'sort-asc' : 'sort-desc') : '';
            html += '<th class="' + cls + '" data-col="' + i + '">' + c.label + '</th>';
        });
        html += '</tr></thead><tbody>';

        sorted.forEach(function(s, idx) {
            var ts = new Date(s.created_at).getTime();
            var dir = s.acted_on
                ? '<span class="dir-' + s.direction + '">' + s.direction + '</span>'
                : '\u2013';
            var edge = s.edge ? (s.edge * 100).toFixed(1) + '%' : '\u2013';
            var kelly = s.kelly_fraction ? (s.kelly_fraction * 100).toFixed(1) + '%' : '\u2013';
            var status = s.acted_on
                ? '<span class="fired">FIRED</span>'
                : '<span class="rejected ' + rejClass(s.rejection_reason) + '">' + (s.rejection_reason || 'rejected') + '</span>';
            html += '<tr class="row-new" style="animation-delay:' + (idx * 0.018) + 's">' +
                '<td><span class="age ' + ageClass(new Date(ts)) + '" data-ts="' + ts + '">' + ageText(new Date(ts)) + '</span></td>' +
                '<td class="ticker-cell">' + s.ticker + '</td>' +
                '<td>' + dir + '</td>' +
                '<td>' + edge + '</td>' +
                '<td>' + kelly + '</td>' +
                '<td>' + status + '</td>' +
            '</tr>';
        });
        html += '</tbody></table>';

        el.innerHTML = html;
        bindSort(el, 'signals', renderSignals);
        touchMeta(2);
    }

    // ── Positions ─────────────────────────────────────────────────────────────
    function fetchPositions() {
        fetchJSON('/api/positions').then(function(positions) {
            if (!positions) return;
            // Enrich with current_price from model state cache
            positions.forEach(function(p) {
                if (!p.current_price) {
                    var match = cachedModelState.find(function(m) { return m.ticker === p.ticker; });
                    if (match) p.current_price = match.market_price;
                }
            });
            cachedPositions = positions;
            renderPositions();
        });
    }

    function renderPositions() {
        var el = document.getElementById('positions-table');
        if (!cachedPositions.length) {
            el.innerHTML = '<span class="rejected rej-generic">no open positions</span>';
            touchMeta(3);
            return;
        }

        var st = sortState.positions;
        var cols = [
            { label: 'Ticker',  fn: function(p) { return p.ticker; } },
            { label: 'Dir',     fn: function(p) { return p.direction; } },
            { label: 'Size',    fn: function(p) { return p.size_cents; } },
            { label: 'Fill',    fn: function(p) { return p.fill_price || 0; } },
            { label: 'Unreal.', fn: function(p) { var u = calcUnrealized(p); return u !== null ? u : -Infinity; } },
            { label: 'Status',  fn: function(p) { return p.status; } },
            { label: 'Latency', fn: function(p) { return p.latency_ms || 0; } },
        ];

        var sorted = cachedPositions.slice().sort(function(a, b) {
            var av = cols[st.col].fn(a), bv = cols[st.col].fn(b);
            return av < bv ? -st.dir : av > bv ? st.dir : 0;
        });

        var html = '<table><thead><tr>';
        cols.forEach(function(c, i) {
            var cls = i === st.col ? (st.dir === 1 ? 'sort-asc' : 'sort-desc') : '';
            html += '<th class="' + cls + '" data-col="' + i + '">' + c.label + '</th>';
        });
        html += '</tr></thead><tbody>';

        sorted.forEach(function(p, idx) {
            var upnl = calcUnrealized(p);
            var upnlStr = upnl === null ? '\u2013' : (upnl >= 0 ? '+' : '') + '$' + (upnl / 100).toFixed(2);
            var upnlCls = upnl === null ? 'upnl-zero' : upnl > 0 ? 'upnl-pos' : upnl < 0 ? 'upnl-neg' : 'upnl-zero';
            var statusCls = p.status === 'filled' ? 'dir-yes' : p.status === 'pending' ? 'edge-low' : 'rejected rej-generic';
            html += '<tr class="row-new" style="animation-delay:' + (idx * 0.018) + 's">' +
                '<td class="ticker-cell">' + p.ticker + '</td>' +
                '<td class="dir-' + p.direction + '">' + p.direction + '</td>' +
                '<td>$' + (p.size_cents / 100).toFixed(2) + '</td>' +
                '<td>' + (p.fill_price ? (p.fill_price * 100).toFixed(0) + 'c' : '\u2013') + '</td>' +
                '<td class="' + upnlCls + '">' + upnlStr + '</td>' +
                '<td class="' + statusCls + '">' + p.status + '</td>' +
                '<td>' + (p.latency_ms ? p.latency_ms + 'ms' : '\u2013') + '</td>' +
            '</tr>';
        });
        html += '</tbody></table>';

        el.innerHTML = html;
        bindSort(el, 'positions', renderPositions);
        touchMeta(3);
    }

    // ── Daily Summary ─────────────────────────────────────────────────────────
    function fetchSummary() {
        fetchJSON('/api/daily-summary').then(function(days) {
            if (!days) return;
            cachedSummary = days;
            renderSummary();
        });
    }

    function renderSummary() {
        var el = document.getElementById('daily-summary');
        if (!cachedSummary.length) {
            el.innerHTML = '<span class="rejected rej-generic">no trading data</span>';
            touchMeta(4);
            return;
        }

        var st = sortState.summary;
        var cols = [
            { label: 'Date',    fn: function(d) { return d.date; } },
            { label: 'Signals', fn: function(d) { return d.total_signals || 0; } },
            { label: 'Orders',  fn: function(d) { return d.total_orders || 0; } },
            { label: 'W / L',   fn: function(d) { return (d.wins || 0) - (d.losses || 0); } },
            { label: 'Net P&L', fn: function(d) { return d.net_pnl_cents || 0; } },
        ];

        var sorted = cachedSummary.slice().sort(function(a, b) {
            var av = cols[st.col].fn(a), bv = cols[st.col].fn(b);
            return av < bv ? -st.dir : av > bv ? st.dir : 0;
        });

        var html = '<table><thead><tr>';
        cols.forEach(function(c, i) {
            var cls = i === st.col ? (st.dir === 1 ? 'sort-asc' : 'sort-desc') : '';
            html += '<th class="' + cls + '" data-col="' + i + '">' + c.label + '</th>';
        });
        html += '</tr></thead><tbody>';

        sorted.forEach(function(d, idx) {
            var pnl = (d.net_pnl_cents || 0) / 100;
            var pnlCls = pnl > 0 ? 'pnl-positive' : pnl < 0 ? 'pnl-negative' : 'pnl-zero';
            html += '<tr class="row-new" style="animation-delay:' + (idx * 0.018) + 's">' +
                '<td>' + d.date + '</td>' +
                '<td>' + (d.total_signals || 0) + '</td>' +
                '<td>' + (d.total_orders || 0) + '</td>' +
                '<td>' + (d.wins || 0) + ' / ' + (d.losses || 0) + '</td>' +
                '<td class="' + pnlCls + '">' + (pnl >= 0 ? '+' : '') + '$' + pnl.toFixed(2) + '</td>' +
            '</tr>';
        });
        html += '</tbody></table>';

        el.innerHTML = html;
        bindSort(el, 'summary', renderSummary);
        touchMeta(4);
    }

    // ── Keyboard shortcuts ────────────────────────────────────────────────────
    var focusedPanel = null;
    document.addEventListener('keydown', function(e) {
        var tag = (document.activeElement || {}).tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA') return;

        if (['1', '2', '3', '4'].includes(e.key)) {
            var pid = 'panel-' + e.key;
            if (focusedPanel && focusedPanel !== pid) {
                document.getElementById(focusedPanel).classList.remove('focused');
            }
            focusedPanel = (focusedPanel === pid) ? null : pid;
            if (focusedPanel) document.getElementById(focusedPanel).classList.add('focused');
            else document.getElementById(pid).classList.remove('focused');
        }
        if (e.key === 'Escape' && focusedPanel) {
            document.getElementById(focusedPanel).classList.remove('focused');
            focusedPanel = null;
        }
        if (e.key.toLowerCase() === 'r') fetchAll();
    });

    // ── Age ticker ────────────────────────────────────────────────────────────
    function tickAges() {
        document.querySelectorAll('.age[data-ts]').forEach(function(el) {
            var ts = parseInt(el.dataset.ts);
            var d = new Date(ts);
            el.textContent = ageText(d);
            el.className = 'age ' + ageClass(d);
        });
    }
    setInterval(tickAges, 10000);

    // ── Polling ───────────────────────────────────────────────────────────────
    function fetchAll() {
        fetchHealth();
        fetchModelState();
        fetchSignals();
        fetchPositions();
        fetchSummary();
    }

    // Initial load
    fetchAll();

    // Set up polling intervals
    setInterval(fetchHealth, 10000);
    setInterval(fetchModelState, 5000);
    setInterval(fetchSignals, 5000);
    setInterval(fetchPositions, 10000);
    setInterval(fetchSummary, 30000);
    </script>
</body>
</html>
