{% extends "base.html" %}
{% block title_suffix %} — Signals{% endblock %}

{% block content %}
<div class="t-grid" style="grid-template-columns:1fr; grid-template-rows: auto 1fr;">

    <!-- ── Filter Bar + Top Panels ──────────────────────── -->
    <div class="t-panel" style="border-bottom:1px solid var(--t-border);">
        <div class="t-panel-body" style="padding:var(--t-sp-md) var(--t-sp-lg);">
            <!-- Filters -->
            <div id="filter-bar" style="display:flex; gap:var(--t-sp-xl); align-items:center; margin-bottom:var(--t-sp-lg); flex-wrap:wrap;">
                <div style="display:flex; align-items:center; gap:var(--t-sp-sm);">
                    <span class="t-muted-txt" style="font-size:var(--t-fs-xs); text-transform:uppercase; letter-spacing:1px;">Type</span>
                    <select id="f-type" class="t-select" onchange="applyFilters()">
                        <option value="">All</option>
                        <option value="weather">Weather</option>
                        <option value="crypto">Crypto</option>
                    </select>
                </div>
                <div style="display:flex; align-items:center; gap:var(--t-sp-sm);">
                    <span class="t-muted-txt" style="font-size:var(--t-fs-xs); text-transform:uppercase; letter-spacing:1px;">Status</span>
                    <select id="f-status" class="t-select" onchange="applyFilters()">
                        <option value="">All</option>
                        <option value="fired">Fired</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
                <div style="display:flex; align-items:center; gap:var(--t-sp-sm);">
                    <span class="t-muted-txt" style="font-size:var(--t-fs-xs); text-transform:uppercase; letter-spacing:1px;">Window</span>
                    <select id="f-hours" class="t-select" onchange="applyFilters()">
                        <option value="1">1h</option>
                        <option value="6">6h</option>
                        <option value="24" selected>24h</option>
                        <option value="168">7d</option>
                    </select>
                </div>
                <div style="flex:1;"></div>
                <span class="t-muted-txt" id="signal-count" style="font-size:var(--t-fs-xs);"></span>
            </div>

            <!-- Top row: heatmap + rejection breakdown -->
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--t-border);">
                <!-- Heatmap -->
                <div style="background:var(--t-bg); padding:var(--t-sp-md) var(--t-sp-lg);">
                    <div style="font-size:var(--t-fs-xs); color:var(--t-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:var(--t-sp-sm); font-weight:600;">Signal Heatmap</div>
                    <div id="sgnl-heatmap"></div>
                </div>
                <!-- Rejection Breakdown -->
                <div style="background:var(--t-bg); padding:var(--t-sp-md) var(--t-sp-lg);">
                    <div style="font-size:var(--t-fs-xs); color:var(--t-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:var(--t-sp-sm); font-weight:600;">Rejection Breakdown</div>
                    <div id="sgnl-rejections"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Signal Log ───────────────────────────────────── -->
    <div class="t-panel">
        <div class="t-panel-header">
            <div class="t-panel-title">Signal Log</div>
            <div style="display:flex; gap:var(--t-sp-md); align-items:center;">
                <div class="t-panel-meta" id="meta-sgnl-log"></div>
                <div style="display:flex; gap:var(--t-sp-sm);">
                    <button class="t-btn" id="btn-prev" onclick="pageChange(-1)" disabled>&laquo; Prev</button>
                    <span class="t-muted-txt" id="page-info" style="font-size:var(--t-fs-xs); line-height:22px;"></span>
                    <button class="t-btn" id="btn-next" onclick="pageChange(1)">Next &raquo;</button>
                </div>
            </div>
        </div>
        <div class="t-panel-body" id="sgnl-log"></div>
    </div>
</div>

<style>
.t-select {
    background: var(--t-bg-panel);
    color: var(--t-text);
    border: 1px solid var(--t-border);
    padding: 2px 6px;
    font-family: var(--t-font);
    font-size: var(--t-fs-sm);
    cursor: pointer;
}
.t-select:hover { border-color: var(--t-border-lit); }
.t-select:focus { outline: 1px solid var(--t-amber); border-color: var(--t-amber); }

.t-btn {
    background: var(--t-bg-panel);
    color: var(--t-muted);
    border: 1px solid var(--t-border);
    padding: 2px 8px;
    font-family: var(--t-font);
    font-size: var(--t-fs-xs);
    cursor: pointer;
}
.t-btn:hover:not(:disabled) { color: var(--t-text); border-color: var(--t-border-lit); }
.t-btn:disabled { opacity: 0.3; cursor: default; }

.t-rej-bar-row {
    display: flex;
    align-items: center;
    gap: var(--t-sp-md);
    margin-bottom: 3px;
    font-size: var(--t-fs-sm);
}
.t-rej-bar-label {
    width: 110px;
    text-align: right;
    color: var(--t-text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.t-rej-bar-track {
    flex: 1;
    height: 10px;
    background: var(--t-border);
    border-radius: 1px;
    overflow: hidden;
}
.t-rej-bar-fill {
    height: 100%;
    border-radius: 1px;
    transition: width 0.4s ease;
}
.t-rej-bar-value {
    width: 60px;
    color: var(--t-muted);
    font-size: var(--t-fs-xs);
}
</style>
{% endblock %}

{% block scripts %}
<script>
(function() {
    var PAGE_SIZE = 50;
    var currentPage = 0;
    var cachedSignals = [];
    var cachedBreakdown = [];

    Terminal.sortState.sgnl_log = { col: 0, dir: -1 };

    // ── Filters ──────────────────────────────────────────────────
    window.applyFilters = function() {
        currentPage = 0;
        fetchAll();
    };

    window.pageChange = function(delta) {
        currentPage = Math.max(0, currentPage + delta);
        fetchSignals();
    };

    function getFilters() {
        var type = document.getElementById('f-type').value || null;
        var statusSel = document.getElementById('f-status').value;
        var hours = parseInt(document.getElementById('f-hours').value);
        var acted_on = statusSel === 'fired' ? true : statusSel === 'rejected' ? false : null;
        return { type: type, acted_on: acted_on, hours: hours };
    }

    // ── Heatmap ──────────────────────────────────────────────────
    function renderHeatmap() {
        var el = document.getElementById('sgnl-heatmap');
        var all = cachedSignals.slice().reverse();
        var fired = all.filter(function(s) { return s.acted_on; }).length;
        var total = all.length;

        if (!total) {
            el.innerHTML = '<span class="t-dim-txt" style="font-style:italic;">no signals in window</span>';
            return;
        }

        var blocks = all.map(function(s) {
            var cls, tip;
            if (s.acted_on) {
                cls = 't-hm-fired';
                tip = 'FIRED | ' + s.ticker + ' ' + s.direction + ' | ' + ((s.edge || 0) * 100).toFixed(1) + '%';
            } else if ((s.rejection_reason || '').includes('edge')) {
                cls = 't-hm-low-edge';
                tip = 'LOW EDGE | ' + s.ticker + ' | ' + ((s.edge || 0) * 100).toFixed(1) + '%';
            } else {
                cls = 't-hm-rejected';
                tip = 'REJECTED | ' + s.ticker + ' | ' + (s.rejection_reason || 'unknown');
            }
            return '<div class="t-hm ' + cls + '" title="' + tip + '"></div>';
        }).join('');

        el.innerHTML =
            '<div class="t-heatmap-strip" style="margin-bottom:var(--t-sp-sm);">' + blocks + '</div>' +
            '<div style="font-size:var(--t-fs-xs); color:var(--t-muted);">' +
                '<span class="t-positive">' + fired + ' fired</span> \u2003' +
                '<span class="t-muted-txt">' + (total - fired) + ' rejected</span> \u2003' +
                'of ' + total +
            '</div>';
    }

    // ── Rejection Breakdown ──────────────────────────────────────
    function fetchBreakdown() {
        var f = getFilters();
        Terminal.fetchJSON('/api/decision-breakdown?hours=' + f.hours).then(function(data) {
            if (!data) return;
            cachedBreakdown = data;
            renderBreakdown();
        });
    }

    function renderBreakdown() {
        var el = document.getElementById('sgnl-rejections');
        if (!cachedBreakdown.length) {
            el.innerHTML = '<span class="t-dim-txt" style="font-style:italic;">no rejections in window</span>';
            return;
        }

        var colors = {
            'edge': 'var(--t-yellow)',
            'position': 'var(--t-muted)',
            'risk': 'var(--t-red)',
            'feed': 'var(--t-blue)',
            'stale': 'var(--t-blue)',
        };

        function barColor(reason) {
            for (var k in colors) {
                if (reason.includes(k)) return colors[k];
            }
            return 'var(--t-muted)';
        }

        var maxCount = cachedBreakdown[0].count;
        var html = cachedBreakdown.slice(0, 8).map(function(d) {
            var pct = (d.pct * 100).toFixed(0);
            var widthPct = (d.count / maxCount * 100).toFixed(1);
            return '<div class="t-rej-bar-row">' +
                '<span class="t-rej-bar-label">' + d.reason + '</span>' +
                '<div class="t-rej-bar-track"><div class="t-rej-bar-fill" style="width:' + widthPct + '%; background:' + barColor(d.reason) + ';"></div></div>' +
                '<span class="t-rej-bar-value">' + d.count + ' (' + pct + '%)</span>' +
            '</div>';
        }).join('');

        el.innerHTML = html;
    }

    // ── Signal Log ───────────────────────────────────────────────
    function fetchSignals() {
        var f = getFilters();
        var url = '/api/signals?limit=' + PAGE_SIZE + '&offset=' + (currentPage * PAGE_SIZE);
        if (f.type) url += '&signal_type=' + f.type;
        if (f.acted_on !== null) url += '&acted_on=' + f.acted_on;
        url += '&hours=' + f.hours;

        Terminal.fetchJSON(url).then(function(data) {
            if (!data) return;
            cachedSignals = data;
            renderSignals();
            renderHeatmap();

            // Update pagination buttons
            document.getElementById('btn-prev').disabled = currentPage === 0;
            document.getElementById('btn-next').disabled = data.length < PAGE_SIZE;
            document.getElementById('page-info').textContent = 'page ' + (currentPage + 1);
            document.getElementById('signal-count').textContent = data.length + ' signals loaded';
        });
    }

    function renderSignals() {
        var el = document.getElementById('sgnl-log');
        if (!cachedSignals.length) {
            el.innerHTML = '<div class="t-empty">no signals match filters</div>';
            Terminal.touchMeta('sgnl-log');
            return;
        }

        var cols = [
            { label: 'Time',    fn: function(s) { return new Date(s.created_at).getTime(); } },
            { label: 'Ticker',  fn: function(s) { return s.ticker; } },
            { label: 'Type',    fn: function(s) { return s.signal_type || ''; } },
            { label: 'Dir',     fn: function(s) { return s.direction || ''; } },
            { label: 'Prob',    fn: function(s) { return s.model_prob || 0; } },
            { label: 'Market',  fn: function(s) { return s.market_price || 0; } },
            { label: 'Edge',    fn: function(s) { return s.edge || 0; } },
            { label: 'Kelly',   fn: function(s) { return s.kelly_fraction || 0; } },
            { label: 'Min',     fn: function(s) { return s.minutes_remaining || 0; } },
            { label: 'Status',  fn: function(s) { return s.acted_on ? 1 : 0; } },
        ];

        var sorted = Terminal.applySort(cachedSignals, 'sgnl_log', cols);
        var st = Terminal.sortState.sgnl_log;

        var html = '<table class="t-table"><thead><tr>';
        cols.forEach(function(c, i) {
            var cls = i === st.col ? (st.dir === 1 ? 'sort-asc' : 'sort-desc') : '';
            html += '<th class="' + cls + '" data-col="' + i + '">' + c.label + '</th>';
        });
        html += '</tr></thead><tbody>';

        sorted.forEach(function(s, idx) {
            var ts = new Date(s.created_at);
            var timeStr = ts.getUTCHours().toString().padStart(2,'0') + ':' +
                          ts.getUTCMinutes().toString().padStart(2,'0') + ':' +
                          ts.getUTCSeconds().toString().padStart(2,'0');
            var dir = s.acted_on
                ? '<span class="' + (s.direction === 'yes' ? 't-yes' : 't-no') + '">' + s.direction + '</span>'
                : '<span class="t-dim-txt">\u2013</span>';
            var typeCls = s.signal_type === 'crypto' ? 't-amber-txt' : 't-info';
            var status = s.acted_on
                ? '<span class="t-fired">FIRED</span>'
                : '<span class="t-rejected ' + Terminal.rejClass(s.rejection_reason) + '">' + (s.rejection_reason || 'rejected') + '</span>';

            html += '<tr class="t-row-new" style="animation-delay:' + (idx * 0.008) + 's">' +
                '<td><span class="' + Terminal.ageClass(ts) + '" data-ts="' + ts.getTime() + '">' + timeStr + '</span></td>' +
                '<td class="t-ticker">' + s.ticker + '</td>' +
                '<td class="' + typeCls + '">' + (s.signal_type || '\u2013') + '</td>' +
                '<td>' + dir + '</td>' +
                '<td class="t-bright">' + ((s.model_prob || 0) * 100).toFixed(1) + '%</td>' +
                '<td>' + ((s.market_price || 0) * 100).toFixed(1) + '%</td>' +
                '<td class="' + ((s.edge || 0) >= 0.05 ? 't-positive' : 't-warn') + '">' + ((s.edge || 0) * 100).toFixed(1) + '%</td>' +
                '<td>' + ((s.kelly_fraction || 0) * 100).toFixed(1) + '%</td>' +
                '<td class="t-muted-txt">' + (s.minutes_remaining ? s.minutes_remaining.toFixed(0) : '\u2013') + '</td>' +
                '<td>' + status + '</td>' +
            '</tr>';
        });
        html += '</tbody></table>';

        el.innerHTML = html;
        Terminal.bindSort(el, 'sgnl_log', renderSignals);
        Terminal.touchMeta('sgnl-log');
    }

    // ── Refresh ──────────────────────────────────────────────────
    function fetchAll() {
        fetchSignals();
        fetchBreakdown();
    }

    Terminal.refreshPage = fetchAll;

    fetchAll();
    setInterval(fetchSignals, 10000);
    setInterval(fetchBreakdown, 30000);
})();
</script>
{% endblock %}
